# This is a basic workflow to help you get started with Actions

name: Sync codetree subtree

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 KST 1시 (UTC 기준 16시)
  workflow_dispatch:      # 수동 실행 버튼도 추가

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout algorithm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # subtree 병합을 위해 전체 커밋 기록이 필요함
          # push 권한을 위해 기본 토큰 사용
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add codetree remote
        run: |
          git remote add codetree https://github.com/haejun0410/codetree-solutions.git
          git fetch codetree

      - name: Sync codetree subtree (Add or Pull)
        run: |
          # codetree 디렉토리가 없으면 add, 있으면 pull 실행
          if [ ! -d "codetree" ]; then
            echo "Subtree does not exist. Adding..."
            git subtree add --prefix=codetree codetree main --squash
          else
            echo "Subtree exists. Pulling..."
            git subtree pull --prefix=codetree codetree main -m "chore(subtree): sync codetree" --squash
          fi

      - name: Push updated subtree
        run: |
          # main 브랜치로 푸시
          git push origin main
